services:
  - type: web
    name: face-recognition-backend
    runtime: python
    buildCommand: |
      pip install --upgrade pip
      pip install dlib-bin face-recognition-models
      pip install --no-deps face-recognition
      pip install -r requirements.txt gunicorn
    startCommand: gunicorn -w 2 -b 0.0.0.0:$PORT app:app
    envVars:
      - key: FLASK_HOST
        value: "0.0.0.0"
      - key: FLASK_DEBUG
        value: "false"
      - key: ENABLE_PI_TTS
        value: "false"
      - key: DATA_DIR
        value: "/data"
      - key: PYTHON_VERSION
        value: "3.11.9"
    disk:
      name: face-data
      mountPath: /data
      sizeGB: 1

name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  backend-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install minimal CI dependencies
        run: |
          python -m pip install --upgrade pip
          pip install Flask numpy

      - name: Syntax check
        run: |
          python -m py_compile app.py
          python -m py_compile pi_camera_client.py

      - name: Health route smoke test
        run: |
          python app.py &
          sleep 3
          curl -f http://127.0.0.1:5000/health
